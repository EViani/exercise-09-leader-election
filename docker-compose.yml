services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
        interval: 5s
        retries: 5



  node-1:
    build: .
    environment:
       NODE_ID: 1
       PEERS: "http://node-2:8080,http://node-3:8080"
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Restart when fail, for createDB
    restart: "on-failure"

  node-2:
    build: .
    environment:
       NODE_ID: 2
       PEERS: "http://node-1:8080,http://node-3:8080"
    ports:
      - "8082:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Restart when fail, for createDB
    restart: "on-failure"

  node-3:
    build: .
    environment:
       NODE_ID: 3
       PEERS: "http://node-2:8080,http://node-1:8080"
    ports:
      - "8083:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Restart when fail, for createDB
    restart: "on-failure"
